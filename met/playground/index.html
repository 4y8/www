<textarea spellcheck="false" cols="90" rows="30" id="code">
type unit = Unit

eff gen [a] = yield : a => unit

val lucile : [gen string](unit -> unit)
let lucile! = do yield "Lucile"

val greet : [](<gen string>(unit -> unit) -> unit)
let greet m =
  handle m! with
  | return v => v
  | yield name k =>
    print ("Hello " ^ name ^ "!");
    k!
  end

let main = greet lucile
